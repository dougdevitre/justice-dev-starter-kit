name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─── Validate the tag and run checks ─────────────────────────────────────────
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Confirm package version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

  # ─── Build release artifacts ──────────────────────────────────────────────────
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Create release archive
        run: |
          tar -czf justice-dev-starter-kit-${{ github.ref_name }}.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='coverage' \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: justice-dev-starter-kit-${{ github.ref_name }}.tar.gz
          retention-days: 1

  # ─── Generate changelog & publish GitHub Release ─────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Previous tag/commit: $PREV_TAG"

          CHANGELOG=$(git log "$PREV_TAG"..HEAD \
            --pretty=format:"- %s (%h)" \
            --no-merges)

          # Write to a temp file to handle multi-line safely
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          } > /tmp/release-notes.md

          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Justice Dev Starter Kit ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            justice-dev-starter-kit-${{ github.ref_name }}.tar.gz
