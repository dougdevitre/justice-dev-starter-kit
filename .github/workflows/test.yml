name: Tests

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npx prettier --check src/

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageReporters=json --coverageReporters=lcov --coverageReporters=text-summary
        env:
          CI: true

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: justice-dev-starter-kit
          fail_ci_if_error: false

      - name: Enforce coverage threshold (85%)
        if: matrix.node-version == '20.x'
        run: |
          COVERAGE=$(node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            const pct = (
              total.lines.pct +
              total.statements.pct +
              total.functions.pct +
              total.branches.pct
            ) / 4;
            console.log(pct.toFixed(2));
          ")
          echo "Average coverage: ${COVERAGE}%"
          node -e "
            const pct = parseFloat('${COVERAGE}');
            if (pct < 85) {
              console.error('Coverage ' + pct + '% is below required threshold of 85%');
              process.exit(1);
            }
            console.log('Coverage check passed: ' + pct + '%');
          "

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            } catch (e) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }
            const total = summary.total;
            const avg = (
              total.lines.pct +
              total.statements.pct +
              total.functions.pct +
              total.branches.pct
            ) / 4;
            const emoji = avg >= 85 ? '✅' : '❌';
            const body = [
              '## ' + emoji + ' Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              '| Lines | ' + total.lines.pct + '% |',
              '| Statements | ' + total.statements.pct + '% |',
              '| Functions | ' + total.functions.pct + '% |',
              '| Branches | ' + total.branches.pct + '% |',
              '| **Average** | **' + avg.toFixed(2) + '%** |',
              '',
              avg < 85
                ? '> ⚠️ Coverage is below the required **85%** threshold.'
                : '> Coverage meets the required **85%** threshold.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Coverage Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
