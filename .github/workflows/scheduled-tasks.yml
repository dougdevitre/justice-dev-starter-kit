name: Scheduled Tasks

on:
  schedule:
    # Daily security audit - 03:00 UTC
    - cron: '0 3 * * *'
    # Weekly dependency updates - Monday 04:00 UTC
    - cron: '0 4 * * 1'
    # Monthly full ecosystem integration tests - 1st of month 05:00 UTC
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run manually'
        required: true
        type: choice
        options:
          - daily-security-audit
          - weekly-dependency-updates
          - monthly-integration-tests
          - all

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  daily-security-audit:
    name: Daily Security Audit
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.task == 'daily-security-audit' ||
        github.event.inputs.task == 'all'
      ) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --json > /tmp/audit-report.json || true
          npm audit --audit-level=high
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: daily-audit-${{ github.run_number }}
          path: /tmp/audit-report.json
          retention-days: 14

      - name: Fail on critical vulnerabilities
        run: npm audit --audit-level=critical

  weekly-dependency-updates:
    name: Weekly Dependency Updates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.task == 'weekly-dependency-updates' ||
        github.event.inputs.task == 'all'
      ) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for outdated packages
        id: outdated
        run: |
          OUTDATED=$(npm outdated --json 2>/dev/null || echo '{}')
          echo "${OUTDATED}" > /tmp/outdated.json
          COUNT=$(echo "${OUTDATED}" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{
              const o=JSON.parse(d);
              console.log(Object.keys(o).length);
            });
          ")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Found ${COUNT} outdated packages"

      - name: Update patch/minor dependencies
        if: steps.outdated.outputs.count != '0'
        run: |
          # Update patch and minor versions only (respects semver ranges)
          npm update
          npm install

      - name: Run tests after update
        if: steps.outdated.outputs.count != '0'
        run: npm test
        env:
          CI: true

      - name: Create PR with dependency updates
        if: steps.outdated.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const status = execSync('git status --porcelain').toString().trim();
            if (!status) {
              console.log('No changes to commit after dependency update.');
              return;
            }

            const branch = `deps/weekly-update-${new Date().toISOString().slice(0, 10)}`;
            execSync(`git checkout -b ${branch}`);
            execSync('git add package.json package-lock.json');
            execSync('git commit -m "chore(deps): weekly dependency updates [skip ci]"');
            execSync(`git push origin ${branch}`);

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(deps): weekly dependency updates ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## 📦 Weekly Dependency Updates',
                '',
                'Automated dependency updates from the weekly scheduled task.',
                '',
                '### Changes',
                '- Updated patch and minor versions within current semver ranges',
                '- All tests passed after update',
                '',
                '> This PR was automatically created by the scheduled dependency update workflow.',
              ].join('\n'),
              head: branch,
              base: 'main',
            });

  monthly-integration-tests:
    name: Monthly Full Ecosystem Integration Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.task == 'monthly-integration-tests' ||
        github.event.inputs.task == 'all'
      ) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 5 1 * *')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test -- --coverage
        env:
          CI: true

      - name: Run integration tests (if available)
        run: |
          if node -e "require('./package.json').scripts['test:integration']" 2>/dev/null; then
            npm run test:integration
          else
            echo "No integration test script found - skipping."
          fi
        env:
          CI: true

      - name: Upload monthly test report
        uses: actions/upload-artifact@v4
        with:
          name: monthly-integration-report-${{ github.run_number }}
          path: coverage/
          retention-days: 90
